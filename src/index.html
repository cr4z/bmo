<!doctype html>
<html lang="en">
  <head>

  </head>

      <style>@import url("./styles.css");</style>

          </div>
        </div>
        <footer>bmo-template</footer>

    <dash-board></dash-board>
    <script type="module" src="./main.ts"></script>
